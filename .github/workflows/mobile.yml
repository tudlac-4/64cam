name: Mobile

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile.yml'

jobs:
  # ── Analyse & test ───────────────────────────────────────────────────────────
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  # ── Android APK ─────────────────────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build release APK (unsigned)
        run: flutter build apk --release --no-shrink

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cam64-android-${{ github.sha }}
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # On version tags, attach APK to the GitHub Release created by release.yml
      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/build/app/outputs/flutter-apk/app-release.apk

  # ── iOS xcarchive (unsigned) ─────────────────────────────────────────────────
  ios:
    name: iOS build
    runs-on: macos-15
    needs: analyze
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Pod install
        working-directory: mobile/ios
        run: pod install --repo-update

      # Build unsigned xcarchive; signing requires certificates in Secrets.
      # See docs/deployment.md for signing + TestFlight distribution steps.
      - name: Build iOS xcarchive
        run: |
          flutter build ios --release --no-codesign
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath /tmp/cam64.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload xcarchive
        uses: actions/upload-artifact@v4
        with:
          name: cam64-ios-${{ github.sha }}
          path: /tmp/cam64.xcarchive
          retention-days: 14
